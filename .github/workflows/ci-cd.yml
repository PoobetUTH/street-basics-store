name: CI/CD Pipeline — Street Basics

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: poobetuth
  BACKEND_IMAGE: poobetuth/streetbasics-backend
  FRONTEND_IMAGE: poobetuth/streetbasics-frontend

jobs:
  # ============================================
  # Job 1: Build & Push Docker Images
  # ============================================
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # ============================================
  # Job 2: Deploy to AWS EC2 (via SSH)
  # ============================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Execute Deployment Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          BACKEND_IM: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IM: ${{ env.FRONTEND_IMAGE }}
          SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: BACKEND_IM,FRONTEND_IM,SHA
          script: |
            echo "Updating backend image..."
            kubectl set image deployment/backend backend=${BACKEND_IM}:${SHA} -n street-basics
            
            echo "Updating frontend image..."
            kubectl set image deployment/frontend frontend=${FRONTEND_IM}:${SHA} -n street-basics
            
            echo "Waiting for backend rollout..."
            kubectl rollout status deployment/backend -n street-basics --timeout=120s
            
            echo "Waiting for frontend rollout..."
            kubectl rollout status deployment/frontend -n street-basics --timeout=120s
            
            echo "=== Deployment Successful! Current Pods: ==="
            kubectl get pods -n street-basics
