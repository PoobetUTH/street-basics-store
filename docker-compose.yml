version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: street-basics-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: street_basics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend API Service
  # ============================================
  backend:
    build: ./backend
    container_name: street-basics-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      DB_SSL: "false"
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/street_basics
      JWT_SECRET: street-basics-prod-secret-2024
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: "*"
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================
  # Frontend Service
  # ============================================
  frontend:
    build: ./frontend
    container_name: street-basics-frontend
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      PORT: 8080
      API_BASE: http://backend:4000

volumes:
  postgres_data:
