# ============================================
# PostgreSQL Secret
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: street-basics
type: Opaque
stringData:
  POSTGRES_DB: street_basics
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres123
  DATABASE_URL: postgresql://postgres:postgres123@postgres-service:5432/street_basics

---
# ============================================
# PostgreSQL PersistentVolumeClaim
# ============================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: street-basics
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# ============================================
# PostgreSQL Deployment
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: street-basics
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
# ============================================
# PostgreSQL Service
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: street-basics
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
